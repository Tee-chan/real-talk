
services:
  postgres:
    image: postgres:16-alpine
    container_name: realtalk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: realtalk
      POSTGRES_PASSWORD: realtalk
      POSTGRES_DB: realtalk
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U realtalk']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s 

  redis:
    image: redis:7-alpine
    container_name: realtalk_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
